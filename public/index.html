<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Copilote Data Analyst</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" crossorigin></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
  body { background:#020617; }
  .font-display { font-family:'Space Grotesk',sans-serif; }
  .font-mono-data { font-family:'IBM Plex Mono',monospace; }
  .font-body { font-family:'Inter',sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ---------- backend proxy call (la clé Mistral reste côté serveur) ----------
async function askAgent(system, user) {
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system, user }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Erreur inconnue");
  return data.content;
}

function parseJSON(text) {
  const cleaned = (text || "").replace(/```json/g, "").replace(/```/g, "").trim();
  try { return JSON.parse(cleaned); }
  catch {
    const match = cleaned.match(/\{[\s\S]*\}/);
    if (match) { try { return JSON.parse(match[0]); } catch { return null; } }
    return null;
  }
}

// ---------- identifiant anonyme (seul élément gardé dans le navigateur) ----------
function getUserId() {
  let id = localStorage.getItem("copilote-user-id");
  if (!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`);
    localStorage.setItem("copilote-user-id", id);
  }
  return id;
}

// ---------- lecture / écriture des données dans la base (via le backend) ----------
async function loadRemoteState(userId) {
  try {
    const res = await fetch(`/api/data/${userId}`);
    const json = await res.json();
    return json.data || {};
  } catch {
    return {};
  }
}
async function saveRemoteState(userId, patch, current) {
  try {
    const merged = { ...current, ...patch };
    await fetch(`/api/data/${userId}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data: merged }),
    });
    return merged;
  } catch {
    return current;
  }
}

const DEFAULT_SKILLS = [
  { name: "SQL", current: 5, target: 80 },
  { name: "Excel / Sheets", current: 20, target: 75 },
  { name: "Python", current: 5, target: 70 },
  { name: "Statistiques", current: 10, target: 65 },
  { name: "Outils BI", current: 5, target: 70 },
  { name: "Communication", current: 30, target: 80 },
  { name: "Posture & mindset pro", current: 20, target: 80 },
];

const TABS = [
  { id: "dashboard", label: "Tableau de bord", emoji: "📊" },
  { id: "cv", label: "Analyse CV", emoji: "📄" },
  { id: "roadmap", label: "Feuille de route", emoji: "🗺️" },
  { id: "training", label: "Entraînement", emoji: "🎓" },
  { id: "interview", label: "Entretien", emoji: "💬" },
  { id: "letter", label: "Lettre de motivation", emoji: "✉️" },
];

function SkillBar({ name, current, target }) {
  return (
    <div className="mb-3">
      <div className="flex justify-between text-xs font-mono-data text-slate-400 mb-1">
        <span>{name}</span>
        <span>{current}/{target}</span>
      </div>
      <div className="w-full h-2 bg-slate-800 rounded-full overflow-hidden relative">
        <div className="h-full bg-amber-500/30 absolute" style={{ width: `${target}%` }} />
        <div className="h-full bg-teal-400 relative" style={{ width: `${current}%` }} />
      </div>
    </div>
  );
}

function App() {
  const [userId] = useState(getUserId);
  const [dataLoaded, setDataLoaded] = useState(false);
  const [activeTab, setActiveTab] = useState("dashboard");
  const [profile, setProfile] = useState({ name: "", background: "", targetRole: "Data Analyst Junior" });
  const [cvText, setCvText] = useState("");
  const [cvResult, setCvResult] = useState(null);
  const [cvLoading, setCvLoading] = useState(false);
  const [roadmap, setRoadmap] = useState(null);
  const [roadmapLoading, setRoadmapLoading] = useState(false);
  const [skills, setSkills] = useState(DEFAULT_SKILLS);
  const [messages, setMessages] = useState([]);
  const [chatInput, setChatInput] = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const [jobDesc, setJobDesc] = useState("");
  const [coverLetter, setCoverLetter] = useState("");
  const [letterLoading, setLetterLoading] = useState(false);
  const [selectedSkill, setSelectedSkill] = useState(null);
  const [skillTraining, setSkillTraining] = useState({});
  const [skillLoading, setSkillLoading] = useState(false);
  const [showSolution, setShowSolution] = useState(false);
  const [apiError, setApiError] = useState("");
  const [copied, setCopied] = useState(false);
  const chatEndRef = useRef(null);

  // Charger les données sauvegardées depuis la base au premier affichage
  useEffect(() => {
    (async () => {
      const remote = await loadRemoteState(userId);
      if (remote.profile) setProfile(remote.profile);
      if (remote.cvText) setCvText(remote.cvText);
      if (remote.cvResult) setCvResult(remote.cvResult);
      if (remote.roadmap) setRoadmap(remote.roadmap);
      if (remote.skills) setSkills(remote.skills);
      if (remote.coverLetter) setCoverLetter(remote.coverLetter);
      setDataLoaded(true);
    })();
  }, [userId]);

  // Sauvegarde dans la base : fusionne l'état courant avec les modifications
  const persist = (patch) => {
    saveRemoteState(userId, patch, { profile, cvText, cvResult, roadmap, skills, coverLetter });
  };

  useEffect(() => { if (dataLoaded) persist({ profile }); }, [profile, dataLoaded]);
  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const cvScore = cvResult?.overallScore || 0;
  const roadmapScore = roadmap ? Math.round(skills.reduce((a, s) => a + Math.min(s.current, s.target) / s.target, 0) / skills.length * 100) : 0;
  const interviewScore = Math.min(messages.filter((m) => m.role === "user").length * 20, 100);
  const letterScore = coverLetter ? 100 : 0;
  const readiness = Math.round(cvScore * 0.3 + roadmapScore * 0.3 + interviewScore * 0.2 + letterScore * 0.2);

  const analyzeCv = async () => {
    if (!cvText.trim()) return;
    setCvLoading(true);
    setCvResult(null);
    const system = `Tu es un recruteur senior spécialisé dans le recrutement de Data Analysts juniors en France. Réponds UNIQUEMENT en JSON valide, sans texte avant ni après, sans balises markdown. Format exact:
{"overallScore": number(0-100), "strengths": [max 3 strings courtes], "weaknesses": [max 3 strings courtes], "missingKeywords": [max 5 strings], "rewrittenBullets": [{"original": string, "improved": string}] (max 3 items)}`;
    const user = `Voici le CV d'une personne qui débute et vise un premier poste de Data Analyst. Analyse-le et donne un retour concret et actionnable.\n\nCV:\n${cvText}`;
    try {
      const text = await askAgent(system, user);
      const parsed = parseJSON(text);
      setCvResult(parsed);
      persist({ cvText, cvResult: parsed });
      setApiError("");
    } catch (e) { setApiError(e.message); }
    setCvLoading(false);
  };

  const generateRoadmap = async () => {
    setRoadmapLoading(true);
    const system = `Tu es un coach carrière expert en reconversion vers la Data Analyse. Réponds UNIQUEMENT en JSON valide, sans texte avant ni après, sans markdown. Format exact:
{"skills": [{"name": string, "current": number(0-100), "target": number(0-100)}] (exactement 7 items, dans cet ordre et avec ces noms exacts: "SQL", "Excel / Sheets", "Python", "Statistiques", "Outils BI", "Communication", "Posture & mindset pro"), "weeks": [{"week": number, "focus": string court, "tasks": [max 3 strings courtes]}] (exactement 6 semaines), "nextActions": [max 4 strings courtes, à faire cette semaine]}`;
    const user = `Profil: ${profile.name || "Candidat"}, parcours: ${profile.background || "non précisé"}. Objectif: premier poste de ${profile.targetRole}. ${cvResult ? `Points faibles identifiés dans le CV: ${(cvResult.weaknesses || []).join(", ")}.` : ""} Construis une feuille de route réaliste sur 6 semaines pour devenir candidat crédible, en partant de quasi zéro sur les compétences techniques.`;
    try {
      const text = await askAgent(system, user);
      const parsed = parseJSON(text);
      setRoadmap(parsed);
      if (parsed?.skills) setSkills(parsed.skills);
      persist({ roadmap: parsed, skills: parsed?.skills || skills });
      setApiError("");
    } catch (e) { setApiError(e.message); }
    setRoadmapLoading(false);
  };

  const trainSkill = async (skillName) => {
    setSelectedSkill(skillName);
    setSkillLoading(true);
    setShowSolution(false);
    const skillLevel = skills.find((s) => s.name === skillName)?.current ?? 10;
    const system = `Tu es un formateur expert en ${skillName} pour de futurs Data Analysts juniors. Réponds UNIQUEMENT en JSON valide, sans texte avant ni après, sans markdown. Format exact:
{"lesson": string (2-3 phrases max, explique un concept clé adapté au niveau du candidat), "exercise": string (un exercice pratique et concret à réaliser, avec un énoncé précis), "solution": string (la solution ou correction détaillée de l'exercice)}`;
    const user = `Niveau actuel du candidat sur "${skillName}": ${skillLevel}/100 (partant de quasi zéro si le niveau est faible). Propose un mini-cours ciblé et un exercice pratique adapté à ce niveau, utile pour un premier poste de Data Analyst. Varie les exercices à chaque génération.`;
    try {
      const text = await askAgent(system, user);
      const parsed = parseJSON(text);
      setSkillTraining((prev) => ({ ...prev, [skillName]: parsed }));
      const updatedSkills = skills.map((s) =>
        s.name === skillName ? { ...s, current: Math.min(s.current + 5, s.target, 100) } : s
      );
      setSkills(updatedSkills);
      persist({ skills: updatedSkills });
      setApiError("");
    } catch (e) { setApiError(e.message); }
    setSkillLoading(false);
  };

  const startInterview = async () => {
    setMessages([]);
    setChatLoading(true);
    const system = `Tu es un recruteur qui fait passer un entretien d'embauche à un candidat débutant pour un poste de Data Analyst Junior. Pose une seule question pour commencer, courte et accueillante.`;
    try {
      const text = await askAgent(system, "Commence l'entretien.");
      setMessages([{ role: "assistant", content: text }]);
      setApiError("");
    } catch (e) { setApiError(e.message); }
    setChatLoading(false);
  };

  const sendChat = async () => {
    if (!chatInput.trim()) return;
    const newMessages = [...messages, { role: "user", content: chatInput }];
    setMessages(newMessages);
    setChatInput("");
    setChatLoading(true);
    const system = `Tu es un recruteur qui fait passer un entretien d'embauche à un candidat débutant pour un poste de Data Analyst Junior. Pose une question d'entretien à la fois (technique, comportementale ou de mise en situation), réagis brièvement à la réponse précédente du candidat (points forts, points à améliorer), puis enchaîne avec la question suivante. Reste concis, professionnel et bienveillant. Ne pose jamais deux questions à la fois.`;
    const history = newMessages.map((m) => `${m.role === "user" ? "Candidat" : "Recruteur"}: ${m.content}`).join("\n");
    try {
      const text = await askAgent(system, history);
      setMessages((prev) => [...prev, { role: "assistant", content: text }]);
      setApiError("");
    } catch (e) { setApiError(e.message); }
    setChatLoading(false);
  };

  const generateLetter = async () => {
    if (!jobDesc.trim()) return;
    setLetterLoading(true);
    const system = `Tu es un expert en candidatures pour des postes de Data Analyst en France. Rédige une lettre de motivation en français, professionnelle, concrète, sans formules creuses, adaptée à un candidat débutant qui mise sur sa motivation, ses projets personnels et ses compétences transférables. Réponds uniquement avec le texte de la lettre, sans commentaire ni markdown.`;
    const user = `Profil du candidat: ${profile.name || "Candidat"}, parcours: ${profile.background || "non précisé"}. ${cvResult ? `Points forts: ${(cvResult.strengths || []).join(", ")}.` : ""}\n\nOffre d'emploi visée:\n${jobDesc}`;
    try {
      const text = await askAgent(system, user);
      setCoverLetter(text);
      persist({ coverLetter: text });
      setApiError("");
    } catch (e) { setApiError(e.message); }
    setLetterLoading(false);
  };

  const copyLetter = () => {
    navigator.clipboard?.writeText(coverLetter);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  return (
    <div className="min-h-screen w-full bg-slate-950 text-slate-100 flex flex-col md:flex-row">
      <aside className="w-full md:w-64 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 flex md:flex-col">
        <div className="p-5 border-b border-slate-800 hidden md:block">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded bg-teal-400 flex items-center justify-center text-slate-950 font-bold">✨</div>
            <span className="font-display font-bold text-lg tracking-tight">Copilote</span>
          </div>
          <p className="text-xs text-slate-500 mt-1 font-mono-data">DATA ANALYST · JUNIOR</p>
        </div>
        <nav className="flex md:flex-col flex-1 overflow-x-auto md:overflow-visible">
          {TABS.map((t) => (
            <button key={t.id} onClick={() => setActiveTab(t.id)}
              className={`flex items-center gap-2 px-4 py-3 text-sm whitespace-nowrap border-b-2 md:border-b-0 md:border-l-2 transition-colors ${activeTab === t.id ? "border-teal-400 text-teal-300 bg-slate-800/60" : "border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800/30"}`}>
              <span>{t.emoji}</span><span className="font-body">{t.label}</span>
            </button>
          ))}
        </nav>
        <div className="hidden md:block p-4 mt-auto border-t border-slate-800 space-y-3">
          <div>
            <label className="text-xs text-slate-500 font-mono-data">TON PRÉNOM</label>
            <input value={profile.name} onChange={(e) => setProfile({ ...profile, name: e.target.value })}
              placeholder="Ex: Léa"
              className="w-full mt-1 bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-sm outline-none focus:border-teal-400" />
          </div>
          <div>
            <label className="text-xs text-slate-500 font-mono-data">TON IDENTIFIANT</label>
            <p className="text-[10px] text-slate-600 font-mono-data break-all mt-1">{userId}</p>
            <p className="text-[10px] text-slate-600 mt-1 font-body">Note-le pour retrouver tes données sur un autre appareil.</p>
            <button
              onClick={() => {
                const id = window.prompt("Colle ton identifiant pour restaurer tes données :");
                if (id) { localStorage.setItem("copilote-user-id", id.trim()); window.location.reload(); }
              }}
              className="mt-2 text-[10px] font-mono-data text-teal-400 hover:text-teal-300 underline"
            >
              Restaurer depuis un identifiant
            </button>
          </div>
        </div>
      </aside>

      <main className="flex-1 p-4 md:p-8 max-w-4xl">
        <div className="mb-6 flex items-center justify-between flex-wrap gap-3">
          <h1 className="font-display text-2xl font-bold tracking-tight">{TABS.find((t) => t.id === activeTab)?.label}</h1>
          <div className="flex items-center gap-3 bg-slate-900 border border-slate-800 rounded-lg px-4 py-2">
            <span className="text-teal-400">🎯</span>
            <div>
              <p className="text-[10px] text-slate-500 font-mono-data leading-none">SCORE DE PRÉPARATION</p>
              <p className="font-display font-bold text-xl leading-tight text-teal-300">{readiness}<span className="text-sm text-slate-500">/100</span></p>
            </div>
          </div>
        </div>

        {activeTab === "dashboard" && (
          <div className="space-y-6">
            <div className="bg-slate-900 border border-slate-800 rounded-xl p-5">
              <h2 className="font-display font-semibold mb-4">Compétences : actuel vs objectif</h2>
              {skills.map((s, i) => <SkillBar key={i} {...s} />)}
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              {[
                { label: "CV analysé", done: !!cvResult, tab: "cv" },
                { label: "Feuille de route générée", done: !!roadmap, tab: "roadmap" },
                { label: "Compétence entraînée", done: Object.keys(skillTraining).length > 0, tab: "training" },
                { label: "Entretien pratiqué", done: messages.length > 0, tab: "interview" },
              ].map((s) => (
                <button key={s.label} onClick={() => setActiveTab(s.tab)}
                  className="text-left bg-slate-900 border border-slate-800 rounded-xl p-4 hover:border-teal-400/50 transition-colors">
                  <div className="flex items-center justify-between">
                    <span className="text-sm text-slate-300 font-body">{s.label}</span>
                    <span className="text-slate-600">›</span>
                  </div>
                  <span className={`text-xs font-mono-data ${s.done ? "text-teal-400" : "text-slate-600"}`}>{s.done ? "FAIT" : "À FAIRE"}</span>
                </button>
              ))}
            </div>
            {roadmap?.nextActions && (
              <div className="bg-slate-900 border border-slate-800 rounded-xl p-5">
                <h2 className="font-display font-semibold mb-3">Actions de la semaine</h2>
                <ul className="space-y-2">
                  {roadmap.nextActions.map((a, i) => (
                    <li key={i} className="flex items-start gap-2 text-sm text-slate-300 font-body">
                      <span className="text-teal-400 font-mono-data mt-0.5">{String(i + 1).padStart(2, "0")}</span>{a}
                    </li>
                  ))}
                </ul>
              </div>
            )}
            {!cvResult && !roadmap && (
              <p className="text-sm text-slate-500 font-body">Commence par l'onglet <span className="text-teal-400">Analyse CV</span>, puis génère ta <span className="text-teal-400">feuille de route</span>.</p>
            )}
          </div>
        )}

        {activeTab === "cv" && (
          <div className="space-y-4">
            <p className="text-sm text-slate-400 font-body">Colle le texte de ton CV. Le recruteur virtuel te dit ce qui marche, ce qui manque, et réécrit tes points faibles.</p>
            <textarea value={cvText} onChange={(e) => setCvText(e.target.value)} placeholder="Colle ici le contenu de ton CV..."
              className="w-full h-48 bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm outline-none focus:border-teal-400 font-body resize-y" />
            <button onClick={analyzeCv} disabled={cvLoading || !cvText.trim()}
              className="flex items-center gap-2 bg-teal-400 text-slate-950 font-medium px-4 py-2 rounded-lg text-sm disabled:opacity-40 hover:bg-teal-300 transition-colors">
              {cvLoading ? "⏳" : "✨"} Analyser mon CV
            </button>
            {cvResult && (
              <div className="mt-4 space-y-4">
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-5">
                  <p className="text-xs text-slate-500 font-mono-data mb-1">SCORE GLOBAL</p>
                  <p className="font-display text-3xl font-bold text-teal-300">{cvResult.overallScore}/100</p>
                </div>
                <div className="grid sm:grid-cols-2 gap-4">
                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-4">
                    <h3 className="text-sm font-semibold text-teal-300 mb-2 font-body">Points forts</h3>
                    <ul className="space-y-1 text-sm text-slate-300 font-body">{(cvResult.strengths || []).map((s, i) => <li key={i}>• {s}</li>)}</ul>
                  </div>
                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-4">
                    <h3 className="text-sm font-semibold text-amber-400 mb-2 font-body">À améliorer</h3>
                    <ul className="space-y-1 text-sm text-slate-300 font-body">{(cvResult.weaknesses || []).map((s, i) => <li key={i}>• {s}</li>)}</ul>
                  </div>
                </div>
                {cvResult.missingKeywords?.length > 0 && (
                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-4">
                    <h3 className="text-sm font-semibold mb-2 font-body">Mots-clés manquants</h3>
                    <div className="flex flex-wrap gap-2">{cvResult.missingKeywords.map((k, i) => <span key={i} className="text-xs font-mono-data bg-slate-800 text-teal-300 px-2 py-1 rounded">{k}</span>)}</div>
                  </div>
                )}
                {cvResult.rewrittenBullets?.length > 0 && (
                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3">
                    <h3 className="text-sm font-semibold mb-1 font-body">Reformulations</h3>
                    {cvResult.rewrittenBullets.map((b, i) => (
                      <div key={i} className="text-sm font-body">
                        <p className="text-slate-500 line-through">{b.original}</p>
                        <p className="text-slate-100">{b.improved}</p>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {activeTab === "roadmap" && (
          <div className="space-y-4">
            <p className="text-sm text-slate-400 font-body">Génère un plan de 6 semaines pour devenir un candidat crédible, adapté à ton point de départ.</p>
            <button onClick={generateRoadmap} disabled={roadmapLoading}
              className="flex items-center gap-2 bg-teal-400 text-slate-950 font-medium px-4 py-2 rounded-lg text-sm disabled:opacity-40 hover:bg-teal-300 transition-colors">
              {roadmapLoading ? "⏳" : "🗺️"} {roadmap ? "Régénérer la feuille de route" : "Générer ma feuille de route"}
            </button>
            {roadmap?.weeks && (
              <div className="space-y-3 mt-4">
                {roadmap.weeks.map((w) => (
                  <div key={w.week} className="bg-slate-900 border border-slate-800 rounded-xl p-4 flex gap-4">
                    <div className="font-mono-data text-teal-400 text-sm shrink-0 w-16">S{w.week}</div>
                    <div>
                      <h3 className="text-sm font-semibold font-body">{w.focus}</h3>
                      <ul className="mt-1 space-y-0.5 text-sm text-slate-400 font-body">{(w.tasks || []).map((t, i) => <li key={i}>· {t}</li>)}</ul>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {activeTab === "training" && (
          <div className="space-y-4">
            <p className="text-sm text-slate-400 font-body">Choisis une compétence, reçois un mini-cours et un exercice pratique adapté à ton niveau actuel.</p>
            <div className="flex flex-wrap gap-2">
              {skills.map((s) => (
                <button key={s.name} onClick={() => trainSkill(s.name)}
                  className={`text-sm px-3 py-1.5 rounded-lg border transition-colors ${selectedSkill === s.name ? "border-teal-400 bg-slate-800 text-teal-300" : "border-slate-800 bg-slate-900 text-slate-300 hover:border-slate-700"}`}>
                  {s.name} <span className="text-xs text-slate-500 font-mono-data">· {s.current}/{s.target}</span>
                </button>
              ))}
            </div>

            {skillLoading && <p className="text-sm text-slate-500 font-body">⏳ Génération de l'exercice...</p>}

            {selectedSkill && skillTraining[selectedSkill] && !skillLoading && (
              <div className="space-y-3 mt-2">
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-4">
                  <h3 className="text-sm font-semibold text-teal-300 mb-2 font-body">📘 Mini-cours — {selectedSkill}</h3>
                  <p className="text-sm text-slate-300 font-body">{skillTraining[selectedSkill].lesson}</p>
                </div>
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-4">
                  <h3 className="text-sm font-semibold text-amber-400 mb-2 font-body">✏️ Exercice</h3>
                  <p className="text-sm text-slate-300 font-body whitespace-pre-wrap">{skillTraining[selectedSkill].exercise}</p>
                </div>
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-4">
                  {!showSolution ? (
                    <button onClick={() => setShowSolution(true)} className="text-sm text-teal-400 hover:text-teal-300 font-body underline">Voir la solution</button>
                  ) : (
                    <>
                      <h3 className="text-sm font-semibold text-teal-300 mb-2 font-body">✅ Solution</h3>
                      <p className="text-sm text-slate-300 font-body whitespace-pre-wrap">{skillTraining[selectedSkill].solution}</p>
                    </>
                  )}
                </div>
                <button onClick={() => trainSkill(selectedSkill)} disabled={skillLoading}
                  className="flex items-center gap-2 bg-teal-400 text-slate-950 font-medium px-4 py-2 rounded-lg text-sm disabled:opacity-40 hover:bg-teal-300 transition-colors">
                  🔄 Nouvel exercice sur {selectedSkill}
                </button>
              </div>
            )}

            {!selectedSkill && !skillLoading && (
              <p className="text-sm text-slate-500 font-body">Clique sur une compétence ci-dessus pour commencer un entraînement.</p>
            )}
          </div>
        )}

        {activeTab === "interview" && (
          <div className="flex flex-col h-[70vh]">
            <div className="flex items-center justify-between mb-3">
              <p className="text-sm text-slate-400 font-body">Entraîne-toi face à un recruteur virtuel, question par question.</p>
              <button onClick={startInterview} className="text-xs font-mono-data text-teal-400 hover:text-teal-300 border border-slate-800 rounded px-2 py-1">Nouvel entretien</button>
            </div>
            <div className="flex-1 overflow-y-auto bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3">
              {messages.length === 0 && <p className="text-sm text-slate-500 font-body">Clique sur "Nouvel entretien" pour commencer.</p>}
              {messages.map((m, i) => (
                <div key={i} className={`max-w-[85%] ${m.role === "user" ? "ml-auto text-right" : ""}`}>
                  <div className={`inline-block rounded-lg px-3 py-2 text-sm font-body ${m.role === "user" ? "bg-teal-400 text-slate-950" : "bg-slate-800 text-slate-200"}`}>{m.content}</div>
                </div>
              ))}
              {chatLoading && <p className="text-slate-500">⏳</p>}
              <div ref={chatEndRef} />
            </div>
            <div className="flex gap-2 mt-3">
              <input value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && sendChat()}
                placeholder="Ta réponse..." className="flex-1 bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-sm outline-none focus:border-teal-400 font-body" />
              <button onClick={sendChat} disabled={chatLoading || !chatInput.trim()} className="bg-teal-400 text-slate-950 rounded-lg px-3 disabled:opacity-40 hover:bg-teal-300 transition-colors">➤</button>
            </div>
          </div>
        )}

        {activeTab === "letter" && (
          <div className="space-y-4">
            <p className="text-sm text-slate-400 font-body">Colle l'offre d'emploi visée, obtiens une lettre de motivation adaptée à ton profil de débutant.</p>
            <textarea value={jobDesc} onChange={(e) => setJobDesc(e.target.value)} placeholder="Colle ici le texte de l'offre d'emploi..."
              className="w-full h-40 bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm outline-none focus:border-teal-400 font-body resize-y" />
            <button onClick={generateLetter} disabled={letterLoading || !jobDesc.trim()}
              className="flex items-center gap-2 bg-teal-400 text-slate-950 font-medium px-4 py-2 rounded-lg text-sm disabled:opacity-40 hover:bg-teal-300 transition-colors">
              {letterLoading ? "⏳" : "✉️"} Générer la lettre
            </button>
            {coverLetter && (
              <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 relative">
                <button onClick={copyLetter} className="absolute top-3 right-3 text-slate-400 hover:text-teal-300">{copied ? "✓" : "⧉"}</button>
                <p className="whitespace-pre-wrap text-sm text-slate-200 font-body pr-8">{coverLetter}</p>
              </div>
            )}
          </div>
        )}

        {apiError && (
          <div className="fixed bottom-4 left-4 right-4 md:left-auto md:w-96 bg-red-950 border border-red-800 rounded-lg px-3 py-2 text-xs text-red-300 font-body">{apiError}</div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
